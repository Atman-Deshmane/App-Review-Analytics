name: Deploy Dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'dashboard/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install and Build Dashboard
        working-directory: ./dashboard
        run: |
          npm ci
          npm run build
        env:
          # Firebase Config
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_DB_URL: ${{ secrets.VITE_FIREBASE_DB_URL }}
          # GitHub Config
          VITE_GITHUB_TOKEN: ${{ secrets.VITE_GITHUB_TOKEN }}
          VITE_GITHUB_OWNER: ${{ secrets.VITE_GITHUB_OWNER }}
          VITE_GITHUB_REPO: ${{ secrets.VITE_GITHUB_REPO }}
          
      # --- DEPLOY TO HOSTINGER VIA SFTP ---
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: 📂 Deploy via SFTP
        run: |
          lftp -c "
            set sftp:auto-confirm yes;
            set net:max-retries 5;
            set net:reconnect-interval-base 10;
            set net:timeout 60;
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} -p ${{ secrets.FTP_PORT || '65002' }} sftp://${{ secrets.FTP_SERVER }};
            mirror -R --verbose --delete --parallel=3 ./dashboard/dist/ ./;
            quit
          "
